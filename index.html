<title>Sama | Future Engineer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f8f5ef;
    font-family:Arial,sans-serif;
    color:#172330;
}

.container{
    display:flex;
    justify-content:space-between;
    align-items:center;
    min-height:100vh;
    padding:60px 8%;
}

.left{
    width:50%;
}

.right{
    width:40%;
    text-align:center;
}

.right img{
    width:100%;
    max-width:450px;
}

h1{
    font-family:Georgia,serif;
    font-style:italic;
    font-size:90px;
    color:#172330;
}

h2{
    color:#b5965d;
    letter-spacing:8px;
    margin-top:10px;
    margin-bottom:25px;
}

.line{
    width:420px;
    height:2px;
    background:#b5965d;
    margin-bottom:30px;
}

p{
    font-size:22px;
    line-height:1.7;
    margin-bottom:35px;
}

.contact{
    border:1px solid #c8aa72;
    border-radius:18px;
    padding:30px;
    background:white;
}

.contact h3{
    letter-spacing:4px;
    margin-bottom:20px;
}

.contact a{
    display:block;
    text-decoration:none;
    color:#172330;
    padding:14px 0;
    border-bottom:1px solid #ddd;
}

.contact a:last-child{
    border:none;
}

.contact a:hover{
    color:#b5965d;
}

@media(max-width:900px){

.container{
flex-direction:column;
text-align:center;
}

.left,
.right{
width:100%;
}

.line{
margin:auto;
margin-bottom:30px;
width:70%;
}

.right{
margin-top:40px;
}

h1{
font-size:65px;
}

}

</style>

</head>
